<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Voter Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; padding: 50px; }
        .reg-box { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 500px; margin: auto; border: 1px solid #eab308; }
        input { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="reg-box">
        <h2 class="text-warning text-center">Member Registration</h2>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form action="/doRegister" method="post">
            <input type="text" name="id" placeholder="Choose Unique ID" class="form-control" required>
            <input type="text" name="name" placeholder="Full Name" class="form-control" required>
            <input type="text" name="nid" placeholder="NID Number" class="form-control" required>
            <input type="number" name="age" placeholder="Age (Min 18)" class="form-control" required>
            <input type="password" name="password" placeholder="Password" class="form-control" required>
            <button class="btn btn-warning w-100 mt-3">REGISTER NOW</button>
        </form>
        <a href="/" class="btn btn-outline-light w-100 mt-2">Back to Login</a>
    </div>
</body>
</html>
