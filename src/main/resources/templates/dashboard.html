<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; }
        .sidebar { width: 280px; height: 100vh; background: #1e293b; position: fixed; padding: 25px; }
        .content { margin-left: 300px; padding: 40px; }
        .card-stat { background: #334155; border: 1px solid #00ffcc; padding: 20px; border-radius: 15px; }
        
        /* LOGOUT Button: Green Box, Red Text */
        .logout-box {
            background: #22c55e !important; /* Green */
            color: #ef4444 !important; /* Red */
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-top: 50px;
            border: 2px solid #ef4444;
        }
        .logout-box:hover { background: #16a34a !important; color: white !important; }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column">
        <h3 style="color: #00ffcc;">ELECT-PRO 💻</h3>
        <hr>
        <p>User: <b th:text="${user.name}"></b></p>
        <p>Role: <span class="badge bg-info" th:text="${user.role}"></span></p>
        
        <nav class="nav flex-column mt-4">
            <a class="nav-link text-white" href="#">🏠 Dashboard</a>
            <a class="nav-link text-white" href="#">🗳️ Ballot Box</a>
            <a class="nav-link text-white" href="#">📊 Results</a>
        </nav>

        <div class="mt-auto">
            <a href="/logout" class="logout-box">LOGOUT SYSTEM 🚪</a>
        </div>
    </div>

    <div class="content">
        <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>
        <div th:if="${param.success}" class="alert alert-success" th:text="${param.success}"></div>

        <h2>Current Phase: <span class="text-warning" th:text="${phase}"></span></h2>

        <!-- Dashboard Stats -->
        <div class="row mt-4">
            <div class="col-md-4"><div class="card-stat"><h5>Voter Status</h5><h3 th:text="${user.hasVoted ? 'VOTED' : 'NOT VOTED'}"></h3></div></div>
            <div class="col-md-4" th:if="${user.role == 'CANDIDATE'}"><div class="card-stat"><h5>Your Status</h5><h3>APPROVED</h3></div></div>
        </div>

        <!-- Ballot Box (Only if Voter and Election Ongoing) -->
        <div class="mt-5" th:if="${user.role == 'VOTER' AND phase == 'ONGOING'}">
            <h3>🗳️ Ballot Box</h3>
            <div class="row mt-3">
                <div th:each="c : ${candidates}" th:if="${c.status == 'APPROVED'}" class="col-md-4 mb-3">
                    <div class="card-stat text-center">
                        <h1 th:text="${c.icon}"></h1>
                        <h4 th:text="${c.name}"></h4>
                        <p th:text="'Party: ' + ${c.party}"></p>
                        <form action="/vote" method="post">
                            <input type="hidden" name="cid" th:value="${c.id}">
                            <button class="btn btn-cyan w-100" th:disabled="${user.hasVoted}">CAST VOTE</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Apply Candidate (For Voter) -->
        <div class="mt-5" th:if="${user.role == 'VOTER'}">
            <div class="card-stat">
                <h4>📝 Apply for Candidate</h4>
                <p>Terms: Age 25+, No Criminal Record.</p>
                <form action="/applyCandidate" method="post" class="row g-3">
                    <div class="col-auto"><input type="text" name="party" placeholder="Party Name" class="form-control" required></div>
                    <div class="col-auto"><input type="number" name="age" placeholder="Your Age" class="form-control" required></div>
                    <div class="col-auto"><input type="checkbox" name="noCase" required> No Police Record</div>
                    <div class="col-auto"><button class="btn btn-warning">Apply Now</button></div>
                </form>
            </div>
        </div>

        <!-- Admin Control (Only for Admin) -->
        <div class="mt-5" th:if="${user.role == 'ADMIN'}">
            <h3>⚙️ Admin Control Panel</h3>
            <div class="card-stat mt-3">
                <h5>Change Election Status</h5>
                <form action="/admin/status" method="post" class="d-flex gap-2">
                    <select name="status" class="form-select w-25">
                        <option value="UPCOMING">UPCOMING</option>
                        <option value="ONGOING">ONGOING</option>
                        <option value="CLOSED">CLOSED</option>
                    </select>
                    <button class="btn btn-primary">Update Phase</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
