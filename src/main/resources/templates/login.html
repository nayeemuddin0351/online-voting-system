<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Election Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #00ffcc; width: 400px; }
        .btn-cyan { background: #00ffcc; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card text-center">
        <h2 style="color: #00ffcc;">💻 Club Election</h2>
        <div th:if="${error}" class="alert alert-danger p-2" th:text="${error}"></div>
        <div th:if="${param.success}" class="alert alert-success p-2" th:text="${param.success}"></div>
        <form action="/doLogin" method="post" class="mt-4">
            <input type="text" name="id" placeholder="Voter ID" class="form-control mb-3" required>
            <input type="password" name="password" placeholder="Password" class="form-control mb-4" required>
            <button class="btn btn-cyan w-100">LOGIN 🚀</button>
        </form>
        <a href="/register" class="d-block mt-3 text-warning">New Member? Register Here</a>
    </div>
</body>
</html>
